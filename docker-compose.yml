services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src:rw
      - ./frontend/index.html:/app/index.html:rw
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    networks:
      - jeece_3fad5d_network

networks:
  jeece_3fad5d_network:
    driver: bridge
