services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jeece_3fad5d_backend
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --threads 4 --timeout 60 app:app
    volumes:
      - data:/data
    environment:
      DB_PATH: /data/results.db
      TEAM_1_NAME: ${TEAM_1_NAME}
      TEAM_2_NAME: ${TEAM_2_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - jeece_3fad5d_network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: jeece_3fad5d_nginx
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jeece-3fad5d.rule=${TRAEFIK_RULE}"
      - traefik.http.routers.jeece-3fad5d.entrypoints=websecure
      - traefik.http.routers.jeece-3fad5d.tls=true
      - traefik.http.routers.jeece-3fad5d.tls.certresolver=letsencrypt
      - traefik.http.services.jeece-3fad5d.loadbalancer.server.port=80
      - traefik.docker.network=homelab
    networks:
      - jeece_3fad5d_network
      - homelab

volumes:
  data:

networks:
  homelab:
    external: true
  jeece_3fad5d_network:
    driver: bridge
